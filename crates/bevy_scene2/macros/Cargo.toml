[package]
name = "bevy_scene2_macros"
version = "0.19.0-dev"
edition = "2024"
description = "Derive implementations for bevy_scene"
homepage = "https://bevyengine.org"
repository = "https://github.com/bevyengine/bevy"
license = "MIT OR Apache-2.0"
keywords = ["bevy"]

[lib]
proc-macro = true

[[bin]]
name = "bsnfmt"
path = "src/bsn/fmt/bin/bsn_fmt.rs"
required-features = ["fmt"]

[dependencies]
bevy_macro_utils = { path = "../../bevy_macro_utils", version = "0.19.0-dev" }

clap = { version = "4", features = ["derive"], optional = true }
prettyplease = { version = "0.2", optional = true }
syn = { version = "2.0", features = ["full", "extra-traits"] }
proc-macro2 = "1.0"
quote = "1.0"
similar = { version = "2.7.0", optional = true }

[dev-dependencies]
pretty_assertions = "1.4.1"

[features]
fmt = [
  "dep:clap",
  "dep:prettyplease",
  "dep:similar",
  "syn/visit",
  "syn/visit-mut",
  "proc-macro2/span-locations",
  "similar/inline",
]
