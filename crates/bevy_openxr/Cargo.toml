[package]
name = "bevy_openxr"
version = "0.5.0"
edition = "2018"
authors = [
    "Bevy Contributors <bevyengine@gmail.com>",
    "Carter Anderson <mcanders1@gmail.com>",
]
description = "OpenXR presentation and input backend for Bevy Engine"
homepage = "https://bevyengine.org"
repository = "https://github.com/bevyengine/bevy"
license = "MIT"
keywords = ["bevy"]

[dependencies]
# bevy
bevy_app = { path = "../bevy_app", version = "0.5.0" }
bevy_ecs = { path = "../bevy_ecs", version = "0.5.0" }
bevy_log = { path = "../bevy_log", version = "0.5.0" }
bevy_math = { path = "../bevy_math", version = "0.5.0" }
bevy_utils = { path = "../bevy_utils", version = "0.5.0" }
bevy_xr = { path = "../bevy_xr", version = "0.5.0" }

# other
openxr = { path = "../../../openxrs-fork/openxr"}
serde = "1"
ash = "0.32.1"
wgpu = { path = "../../../wgpu/wgpu" }
thiserror = "1.0"

[target.'cfg(target_os = "android")'.dependencies]
ndk-glue = "0.3.0"

[target.'cfg(any(target_os = "linux", target_os = "android"))'.dependencies]
wgpu-hal = { path = "../../../wgpu/wgpu-hal", features = ["vulkan"] }

# [target.'cfg(windows)'.dependencies]
# wgpu-hal = { path = "../../../wgpu/wgpu-hal", features = ["dx11"] }

#test
[target.'cfg(target_os = "macos")'.dependencies]
wgpu-hal = { path = "../../../wgpu/wgpu-hal", features = ["vulkan"] }