[package]
name = "bevy_shader"
version = "0.20.0-dev"
edition = "2024"
description = "Provides shader asset types and import resolution for Bevy"
homepage = "https://bevy.org"
repository = "https://github.com/bevyengine/bevy"
license = "MIT OR Apache-2.0"
keywords = ["bevy", "shader"]

[dependencies]
# bevy
bevy_asset = { path = "../bevy_asset", version = "0.20.0-dev" }
bevy_reflect = { path = "../bevy_reflect", version = "0.20.0-dev" }
bevy_platform = { path = "../bevy_platform", version = "0.20.0-dev" }
bevy_utils = { path = "../bevy_utils", version = "0.20.0-dev" }

# other
wgpu-types = { version = "30", default-features = false }
serde = { version = "1", features = ["derive"] }
thiserror = { version = "2", default-features = false }
wesl = { version = "0.4.1", features = ["naga-ext"] }
tracing = { version = "0.1", default-features = false, features = ["std"] }

[lints]
workspace = true

[package.metadata.docs.rs]
rustdoc-args = [
  "-Zunstable-options",
  "--generate-link-to-definition",
  "--generate-macro-expansion",
]
all-features = true
