[package]
name = "bevy_user_prefs"
version = "0.19.0-dev"
edition = "2024"
description = "User preferences storage for Bevy Engine"
homepage = "https://bevy.org"
repository = "https://github.com/bevyengine/bevy"
license = "MIT OR Apache-2.0"
keywords = ["bevy"]

[dependencies]
# bevy
bevy_app = { path = "../bevy_app", version = "0.19.0-dev" }
bevy_ecs = { path = "../bevy_ecs", version = "0.19.0-dev" }
bevy_log = { path = "../bevy_log", version = "0.19.0-dev" }
bevy_math = { path = "../bevy_math", version = "0.19.0-dev", features = [
  "serialize",
] }
bevy_platform = { path = "../bevy_platform", version = "0.19.0-dev" }
bevy_tasks = { path = "../bevy_tasks", version = "0.19.0-dev" }
bevy_time = { path = "../bevy_time", version = "0.19.0-dev" }

serde = { version = "1", default-features = false, features = ["derive"] }
thiserror = { version = "2", default-features = false }
toml = { version = "0.8.19" }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
dirs = "6.0.0"

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys = { version = "0.3.76", default-features = false, features = [
  "Window",
  "Storage",
] }

[features]
default = []

[lints]
workspace = true

[package.metadata.docs.rs]
rustdoc-args = ["-Zunstable-options", "--generate-link-to-definition"]
all-features = true
