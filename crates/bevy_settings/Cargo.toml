[package]
name = "bevy_settings"
version = "0.19.0-rc.1"
edition = "2024"
description = "User settings framework for Bevy Engine"
homepage = "https://bevy.org"
repository = "https://github.com/bevyengine/bevy"
license = "MIT OR Apache-2.0"
keywords = ["bevy"]

[dependencies]
# bevy
bevy_app = { path = "../bevy_app", version = "0.19.0-rc.1" }
bevy_ecs = { path = "../bevy_ecs", version = "0.19.0-rc.1" }
bevy_ecs_macros = { path = "../bevy_ecs/macros", version = "0.19.0-rc.1" }
bevy_log = { path = "../bevy_log", version = "0.19.0-rc.1" }
bevy_platform = { path = "../bevy_platform", version = "0.19.0-rc.1" }
bevy_reflect = { path = "../bevy_reflect", version = "0.19.0-rc.1" }
bevy_tasks = { path = "../bevy_tasks", version = "0.19.0-rc.1" }
bevy_time = { path = "../bevy_time", version = "0.19.0-rc.1" }

serde = "1.0.217"
thiserror = "2.0.18"
toml = { version = "1.1.0" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys = { version = "0.3", default-features = false, features = [
  "Window",
  "Storage",
] }

[features]
default = []

[lints]
workspace = true

[package.metadata.docs.rs]
rustdoc-args = ["-Zunstable-options", "--generate-link-to-definition"]
all-features = true
