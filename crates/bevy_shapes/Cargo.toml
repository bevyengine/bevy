[package]
description  = "Provides primitive shapes for Bevy Engine"
edition      = "2024"
homepage     = "https://bevy.org"
keywords     = ["bevy"]
license      = "MIT OR Apache-2.0"
name         = "bevy_shapes"
repository   = "https://github.com/bevyengine/bevy"
rust-version = "1.94.0"
version      = "0.20.0-dev"

[dependencies]
approx = { default-features = false, optional = true, version = "0.5" }
arrayvec = { default-features = false, optional = true, version = "0.7" }
bevy_asset = { default-features = false, optional = true, path = "../bevy_asset" }
bevy_color = { default-features = false, optional = true, path = "../bevy_color" }
bevy_gizmos = { default-features = false, optional = true, path = "../bevy_gizmos" }
bevy_math = { default-features = false, path = "../bevy_math" }
bevy_mesh = { default-features = false, optional = true, path = "../bevy_mesh" }
bevy_reflect = { default-features = false, features = [
  "glam",
], optional = true, path = "../bevy_reflect", version = "0.20.0-dev" }
derive_more = { default-features = false, features = [
  "from",
  "into",
], version = "2" }
hexasphere = { default-features = false, optional = true, version = "19.0.0" }
rand = { default-features = false, optional = true, version = "0.10" }
rand_distr = { optional = true, version = "0.6" }
serde = { default-features = false, features = [
  "derive",
], optional = true, version = "1" }
thiserror = { default-features = false, version = "2" }
wgpu-types = { default-features = false, optional = true, version = "29.0.3" }

[dev-dependencies]
bevy_math = { default-features = false, features = [
  "approx",
], path = "../bevy_math" }
bevy_platform = { default-features = false, path = "../bevy_platform" }
chacha20 = { default-features = false, features = ["rng"], version = "0.10.0" }

[features]
alloc   = ["bevy_math/alloc"]
default = ["bevy_math/default", "std"]
std     = ["alloc", "bevy_math/std"]

approx       = ["bevy_math/approx", "dep:approx"]
bevy_reflect = ["alloc", "bevy_math/bevy_reflect", "dep:bevy_reflect"]
serialize    = ["bevy_math/serialize", "dep:serde"]

bounding = ["dep:arrayvec"]
extrusion = ["meshing"]
gizmos = ["dep:bevy_color", "dep:bevy_gizmos"]
meshing = [
  "alloc",
  "bevy_reflect",
  "dep:bevy_asset",
  "dep:bevy_mesh",
  "dep:hexasphere",
  "dep:wgpu-types",
]
sampling = ["bevy_math/rand", "dep:rand", "dep:rand_distr"]

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [
  "--generate-link-to-definition",
  "--generate-macro-expansion",
  "-Zunstable-options",
]
