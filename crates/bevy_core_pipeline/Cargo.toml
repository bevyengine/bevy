[package]
name = "bevy_core_pipeline"
version = "0.19.0-rc.2"
edition = "2024"
description = "Provides a core render pipeline for Bevy Engine."
homepage = "https://bevy.org"
repository = "https://github.com/bevyengine/bevy"
license = "MIT OR Apache-2.0"
keywords = ["bevy"]

[features]
trace = []
webgl = []
webgpu = []
tonemapping_luts = ["bevy_image/ktx2", "bevy_image/zstd"]

[dependencies]
# bevy
bevy_app = { path = "../bevy_app", version = "0.19.0-rc.2" }
bevy_asset = { path = "../bevy_asset", version = "0.19.0-rc.2" }
bevy_color = { path = "../bevy_color", version = "0.19.0-rc.2" }
bevy_derive = { path = "../bevy_derive", version = "0.19.0-rc.2" }
bevy_diagnostic = { path = "../bevy_diagnostic", version = "0.19.0-rc.2" }
bevy_ecs = { path = "../bevy_ecs", version = "0.19.0-rc.2" }
bevy_image = { path = "../bevy_image", version = "0.19.0-rc.2" }
bevy_log = { path = "../bevy_log", version = "0.19.0-rc.2" }
bevy_light = { path = "../bevy_light", version = "0.19.0-rc.2" }
bevy_camera = { path = "../bevy_camera", version = "0.19.0-rc.2" }
bevy_reflect = { path = "../bevy_reflect", version = "0.19.0-rc.2" }
bevy_shader = { path = "../bevy_shader", version = "0.19.0-rc.2" }
bevy_render = { path = "../bevy_render", version = "0.19.0-rc.2" }
bevy_transform = { path = "../bevy_transform", version = "0.19.0-rc.2" }
bevy_math = { path = "../bevy_math", version = "0.19.0-rc.2" }
bevy_utils = { path = "../bevy_utils", version = "0.19.0-rc.2" }
bevy_window = { path = "../bevy_window", version = "0.19.0-rc.2" }
bevy_platform = { path = "../bevy_platform", version = "0.19.0-rc.2", default-features = false, features = [
  "std",
  "serialize",
] }

bitflags = "2.3"
nonmax = "0.5"
indexmap = "2"

[lints]
workspace = true

[package.metadata.docs.rs]
rustdoc-args = [
  "-Zunstable-options",
  "--generate-link-to-definition",
  "--generate-macro-expansion",
]
all-features = true
features = ["bevy_image/zstd_rust"]
