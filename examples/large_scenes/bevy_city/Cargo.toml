[package]
name = "bevy_city"
version = "0.1.0"
edition = "2024"
publish = false
license = "MIT OR Apache-2.0"

[features]
trace_tracy = ["bevy/trace_tracy"]
traffic = []

[dependencies]
bevy = { path = "../../../", features = [
  "https",
  "free_camera",
  "experimental_bevy_feathers",
  "web_asset_cache",
] }

argh = "0.1"
noise = "0.9.0"
rand = "0.10.0"
